<!DOCTYPE html>
<html>
    <head>
        <title>Invest with AIM</title>
        <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
        <meta charset="UTF-8">
        <meta name="theme-color" content="#020617">
        <!-- Static favicon so the browser tab shows our icon before WASM boots (no flash).
             Served from the domain root, so the absolute /assets path is correct.
             The file is forced into the bundle (unhashed) by `static FAVICON` in main.rs. -->
        <link rel="icon" type="image/png" href="/assets/favicon.png">

        <!-- PWA / "Add to Home Screen". These MUST be in the served HTML: iOS reads the
             home-screen icon and standalone meta from the initial markup (not from
             JS-injected tags), so a runtime-only setup installs but won't launch right.
             The referenced files are bundled at these stable paths via `#[used] static`
             asset declarations (with_hash_suffix(false)) in main.rs. -->
        <link rel="manifest" href="/assets/manifest.json">
        <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-title" content="AIM">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

        <!-- Register the root-scoped service worker. Required for a real PWA install
             on Samsung Internet / some Android browsers (without it, "Add to Home
             Screen" only makes a bookmark shortcut), and it caches the app shell so
             the installed app launches reliably/offline. /sw.js is placed at the
             bundle root by the deploy. -->
        <script>
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", function () {
                    navigator.serviceWorker.register("/sw.js").catch(function () {});
                });
            }
        </script>
    <link rel="preload" as="script" href="/./assets/aim-dxh9e322fa69eb3ffe2.js" crossorigin></head>
    <body>
        <div id="main"></div>
    <script type="module" async src="/./assets/aim-dxh9e322fa69eb3ffe2.js"></script>
            </body>
</html>
